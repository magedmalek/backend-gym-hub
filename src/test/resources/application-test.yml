    secret: dGVzdFNlY3JldEtleUZvckp3dEluVGVzdHNPbmx5QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo=
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: http://localhost:3000

  cloudinary:
    cloud-name: test
    api-key: test
    api-secret: test

  infobip:
    api-key: test
    base-url: http://localhost

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
